<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Retell Test</title>
</head>
<body style="font-family: sans-serif; padding: 24px;">
  <h2>Retell Manual Test</h2>
  <p>Use these buttons to test the widget and webhook locally.</p>
  <div style="display:flex; gap:12px;">
    <button id="start" style="padding:10px 14px">Start Retell Call (widget)</button>
    <button id="simulate" style="padding:10px 14px">Simulate Webhook -> /retell-webhook</button>
  </div>

  <pre id="out" style="margin-top:18px; background:#f4f4f6; padding:12px; border-radius:6px; max-width:800px;
  white-space:pre-wrap;
  "></pre>

  <script>
    document.getElementById('start').addEventListener('click', () => {
      if (typeof launchRetellCall === 'function') {
        launchRetellCall();
        document.getElementById('out').textContent = 'Called launchRetellCall()';
      } else {
        document.getElementById('out').textContent = 'launchRetellCall() not available on this page';
      }
    })

    document.getElementById('simulate').addEventListener('click', async () => {
      const out = document.getElementById('out')
      out.textContent = 'Posting sample payload to /retell-webhook...'
      try{
        const res = await fetch('/retell-webhook', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-retell-secret': 'changeme' },
          body: JSON.stringify({ session_id: 'sim-1', phone: '+15551234567', customer_name: 'Sim User', transcript: 'Test' })
        })
        const json = await res.json()
        out.textContent = JSON.stringify(json, null, 2)
      }catch(e){ out.textContent = String(e) }
    })
  </script>
</body>
</html>
